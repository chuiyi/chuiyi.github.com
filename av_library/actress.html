<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="X-UA-Compatible" content="chrome=1">
    <title>AV Library - 演員</title>
    <link rel="icon" type="image/x-icon" href="../assets/images/favicon.ico">
    <link rel="shortcut icon" href="../assets/images/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="../assets/images/favicon.ico">
    <link rel="icon" type="image/png" sizes="16x16" href="../assets/images/favicon.ico">
    <link rel="apple-touch-icon" href="../assets/images/favicon.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="css/av-library.css">
</head>
<body data-av-page="actress">
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <i class="bi bi-collection-play me-2"></i>影片庫
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#avNavbar">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="avNavbar">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">主頁面</a></li>
                    <li class="nav-item"><a class="nav-link" href="later.html">稍後觀看</a></li>
                    <li class="nav-item"><a class="nav-link" href="watched.html">看過的影片</a></li>
                    <li class="nav-item"><a class="nav-link" href="favorite.html">喜愛的影片</a></li>
                    <li class="nav-item"><a class="nav-link active" href="actress.html">演員</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <header class="hero">
        <div class="container">
            <h1 class="section-title">演員列表</h1>
            <p class="text-muted">在影片卡片中點擊詞語標記演員，此頁面可展開檢視該演員的所有影片。</p>
        </div>
    </header>

    <main class="container pb-5">
        <div class="sync-bar mb-4">
            <div class="d-flex flex-wrap gap-2 align-items-center">
                <button type="button" class="btn btn-outline-secondary btn-sm" id="av-sync-run">
                    <i class="bi bi-cloud-arrow-up me-1"></i>Drive 同步
                </button>
                <button type="button" class="btn btn-outline-secondary btn-sm" id="av-sync-auto-btn">自動同步：關</button>
            </div>
            <div class="sync-meta" aria-live="polite">
                <span class="sync-status js-last-sync-text">上次同步：尚未同步</span>
                <span class="sync-status sync-status-pill is-idle" id="av-sync-status">同步狀態：待命</span>
            </div>
        </div>

        <div class="mb-3">
            <!-- 新增演員 -->
            <form id="av-actress-add-form" class="d-flex gap-2 mb-3">
                <input type="text" id="av-actress-add-input" class="form-control" placeholder="輸入演員名稱手動新增…" autocomplete="off" required>
                <button type="submit" class="btn btn-primary btn-sm text-nowrap">
                    <i class="bi bi-person-plus me-1"></i>新增
                </button>
            </form>

            <!-- 搜尋 + 工具列 -->
            <div class="d-flex flex-wrap gap-2 align-items-center justify-content-between mb-3">
                <input type="search" id="av-actress-search" class="form-control" style="max-width:220px;" placeholder="搜尋演員…" autocomplete="off">
                <div class="d-flex gap-2 align-items-center flex-wrap">
                    <!-- 排序 -->
                    <span class="text-muted small">排序：</span>
                    <div class="btn-group btn-group-sm" role="group">
                        <button type="button" class="btn btn-outline-secondary" data-actress-sort="count" title="依影片數量排序">
                            <i class="bi bi-film"></i> 片數
                        </button>
                        <button type="button" class="btn btn-outline-secondary" data-actress-sort="name" title="依名稱排序">
                            <i class="bi bi-sort-alpha-down"></i> 名稱
                        </button>
                    </div>
                    <!-- 視圖 -->
                    <span class="text-muted small actress-view-controls">視圖：</span>
                    <div class="btn-group btn-group-sm actress-view-controls" role="group">
                        <button type="button" class="btn btn-outline-secondary" data-actress-view="list" title="列表模式">
                            <i class="bi bi-list-ul"></i>
                        </button>
                        <button type="button" class="btn btn-outline-secondary" data-actress-view="tab" title="頁籤模式">
                            <i class="bi bi-layout-sidebar"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div id="av-actress-empty" class="empty-state d-none">尚未標記任何演員。<br>在影片卡片點擊分詞按鈕，或在上方輸入框手動新增。</div>
        <div id="av-actress-list"></div>
    </main>

    <div class="modal fade" id="av-actress-manage-modal" tabindex="-1" aria-labelledby="av-actress-manage-title" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="av-actress-manage-title">管理演員：<span id="av-manage-actress-name"></span></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-4">
                        <label for="av-display-name-input" class="form-label">顯示名稱</label>
                        <div class="d-flex gap-2">
                            <input type="text" id="av-display-name-input" class="form-control" placeholder="輸入要顯示的名稱">
                            <button type="button" class="btn btn-primary text-nowrap" id="av-save-display-name-btn">儲存顯示名稱</button>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="av-merge-target-id" class="form-label">整併其他演員到此人</label>
                        <div class="d-flex flex-column gap-2">
                            <select id="av-merge-target-id" class="form-select"></select>
                            <input type="text" id="av-merge-preferred-name" class="form-control" placeholder="整併後顯示名稱（可選）">
                            <button type="button" class="btn btn-outline-primary align-self-start" id="av-merge-actress-btn">執行整併</button>
                        </div>
                    </div>

                    <div>
                        <label class="form-label">已整併別名（可解除）</label>
                        <div id="av-manage-aliases" class="actress-alias-list"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="footer">影片庫 · 2026</div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="js/av-library.js"></script>
</body>
</html>
