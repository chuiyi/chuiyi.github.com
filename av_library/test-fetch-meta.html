<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>測試 fetchMeta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding: 20px; background: #f5f5f5; }
        .test-card { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .log-area { background: #1e1e1e; color: #d4d4d4; padding: 15px; border-radius: 4px; font-family: monospace; font-size: 12px; max-height: 500px; overflow-y: auto; white-space: pre-wrap; }
        .result-box { background: #f8f9fa; padding: 15px; border-radius: 4px; margin-top: 15px; }
        .cover-img { max-width: 300px; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="mb-4">測試 fetchMeta 函數</h1>
        
        <div class="test-card">
            <h5>測試 URL</h5>
            <div class="input-group mb-3">
                <input type="text" id="testUrl" class="form-control" value="https://jable.tv/videos/snos-064/" placeholder="輸入測試 URL">
                <button class="btn btn-primary" onclick="testFetch()">測試</button>
            </div>
            
            <div id="loading" class="d-none">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
                <span class="ms-2">正在獲取資料...</span>
            </div>
        </div>

        <div class="test-card">
            <h5>Console 日誌</h5>
            <div id="consoleLog" class="log-area"></div>
        </div>

        <div class="test-card">
            <h5>結果</h5>
            <div id="result" class="result-box">等待測試...</div>
        </div>
    </div>

    <script>
        // 攔截 console.log
        const originalLog = console.log;
        const logArea = document.getElementById('consoleLog');
        console.log = function(...args) {
            originalLog.apply(console, args);
            const message = args.map(arg => 
                typeof arg === 'object' ? JSON.stringify(arg, null, 2) : String(arg)
            ).join(' ');
            logArea.textContent += message + '\n';
            logArea.scrollTop = logArea.scrollHeight;
        };

        const fetchFromJina = async (targetUrl) => {
            const proxyUrl = `https://r.jina.ai/${targetUrl}`;
            console.log(`[Jina] Fetching ${targetUrl}`);
            
            try {
                const response = await fetch(proxyUrl, {
                    headers: {
                        'Accept': 'text/html',
                        'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'
                    }
                });
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                const text = await response.text();
                console.log(`[Jina] Fetched ${targetUrl}, content length: ${text.length}`);
                console.log(`[Jina] Content type: ${text.includes('Markdown Content:') ? 'Markdown' : 'HTML'}`);
                
                // 顯示前2000個字符
                console.log(`[Jina] First 2000 chars:\n${text.substring(0, 2000)}`);
                
                // 列出所有找到的圖片 URL
                const allImgUrls = text.match(/https?:\/\/assets-cdn\.jable\.tv\/contents\/videos_screenshots\/\d+\/\d+\/(?:320x180\/1|preview)\.jpg/gi);
                console.log(`[Jina] All image URLs found:`, allImgUrls);
                
                return text;
            } catch (error) {
                console.log(`[Jina] 失敗: ${error.message}`);
                throw error;
            }
        };

        const parseJsonLd = (doc) => {
            const jsonLdScript = Array.from(doc.querySelectorAll('script[type="application/ld+json"]'))
                .map(el => {
                    try { return JSON.parse(el.textContent); }
                    catch { return null; }
                })
                .find(obj => obj?.["@type"] === "VideoObject");
            return jsonLdScript || {};
        };

        const pickFirstText = (nodeList) => {
            for (const node of nodeList) {
                const text = node.textContent?.trim();
                if (text) return text;
            }
            return "";
        };

        const resolveUrl = (baseUrl, relativeUrl) => {
            if (!relativeUrl || relativeUrl.startsWith("http")) return relativeUrl;
            try {
                return new URL(relativeUrl, baseUrl).href;
            } catch {
                return relativeUrl;
            }
        };

        const extractStreamUrl = (html) => {
            if (!html) return "";
            
            const hlsMatch = html.match(/var\s+hlsUrl\s*=\s*['"]([^'"]+\.m3u8[^'"]*)['"]/i);
            if (hlsMatch && hlsMatch[1]) {
                console.log(`[extractStreamUrl] Strategy 1 (hlsUrl): ${hlsMatch[1]}`);
                return hlsMatch[1];
            }

            const hlsMatch2 = html.match(/hlsUrl\s*[:=]\s*['"]([^'"]+\.m3u8[^'"]*)['"]/i);
            if (hlsMatch2 && hlsMatch2[1]) {
                console.log(`[extractStreamUrl] Strategy 1b (hlsUrl alt): ${hlsMatch2[1]}`);
                return hlsMatch2[1];
            }
            
            const m3u8Match = html.match(/https?:\/\/[^\s"'<>]*\.m3u8[^\s"'<>]*/i)?.[0];
            if (m3u8Match) {
                console.log(`[extractStreamUrl] Strategy 2 (直接 m3u8): ${m3u8Match}`);
                return m3u8Match.replace(/[;'"]$/, '');
            }
            
            console.log(`[extractStreamUrl] 未找到串流 URL`);
            return "";
        };

        const findMetaFromHtml = (html, fallbackTitle, baseUrl) => {
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, "text/html");
            const titleTag = doc.querySelector("meta[property='og:title']")
                || doc.querySelector("meta[name='twitter:title']")
                || doc.querySelector("meta[name='title']");
            const imageTag = doc.querySelector("meta[property='og:image']")
                || doc.querySelector("meta[name='twitter:image']")
                || doc.querySelector("link[rel='image_src']");
            const jsonLd = parseJsonLd(doc);
            const infoHeaderTitle = pickFirstText(
                doc.querySelectorAll(".info-header h1, .info-header h2, .info-header h3, .info-header .h1, .info-header .h2, .info-header .title")
            );
            const headingTitle = pickFirstText(doc.querySelectorAll("h1, h2, h3"));
            const title = titleTag?.content
                || jsonLd.name
                || infoHeaderTitle
                || headingTitle
                || doc.title
                || fallbackTitle;

            let cover = imageTag?.content || imageTag?.href || jsonLd.thumbnail || "";
            
            console.log(`[findMetaFromHtml] og:image tag:`, imageTag?.content);
            console.log(`[findMetaFromHtml] jsonLd.thumbnail:`, jsonLd.thumbnail);
            
            if (!cover) {
                const poster = doc.querySelector("video[poster]")?.getAttribute("poster");
                if (poster) cover = poster;
                console.log(`[findMetaFromHtml] video poster:`, poster);
            }
            if (!cover) {
                const img = doc.querySelector("img[class*='cover'], img[src*='cover'], img[src*='poster'], img[src*='preview']");
                if (img?.getAttribute("src")) cover = img.getAttribute("src");
                console.log(`[findMetaFromHtml] img element:`, img?.getAttribute("src"));
            }
            if (!cover) {
                const match = html.match(/poster\s*=\s*"([^"]+)"/i);
                if (match?.[1]) cover = match[1];
                console.log(`[findMetaFromHtml] poster regex:`, match?.[1]);
            }
            if (!cover) {
                const previewMatch = html.match(/https?:\/\/assets-cdn\.jable\.tv\/contents\/videos_screenshots\/\d+\/\d+\/preview\.jpg/);
                if (previewMatch?.[0]) cover = previewMatch[0];
                console.log(`[findMetaFromHtml] preview regex:`, previewMatch?.[0]);
            }
            
            if (!cover) {
                const anyImg = html.match(/https?:\/\/[^\s"'<>]*assets-cdn[^\s"'<>]*\.jpg/i)?.[0];
                if (anyImg) cover = anyImg;
                console.log(`[findMetaFromHtml] assets-cdn regex:`, anyImg);
            }
            
            const resolvedCover = resolveUrl(baseUrl, cover);
            console.log(`[findMetaFromHtml] Final cover:`, resolvedCover);
            
            const stream = extractStreamUrl(html);
            
            return { title: title?.trim() || fallbackTitle, cover: resolvedCover, stream };
        };

        const findMetaFromMarkdown = (text, fallbackTitle) => {
            const titleLine = text.match(/^Title:\s*(.+)$/m)?.[1]?.trim();
            const headingLine = text.match(/^####\s+(.+)$/m)?.[1]?.trim();
            const title = titleLine || headingLine || fallbackTitle;

            // 策略 1: 尋找 preview.jpg (完整解析度)
            let cover = text.match(/https?:\/\/assets-cdn\.jable\.tv\/contents\/videos_screenshots\/\d+\/\d+\/preview\.jpg/i)?.[0];
            
            // 策略 2: 尋找任何 jable.tv 的圖片 URL (包括縮圖)
            if (!cover) {
                const thumbMatch = text.match(/https?:\/\/assets-cdn\.jable\.tv\/contents\/videos_screenshots\/(\d+)\/(\d+)\/320x180\/1\.jpg/i);
                if (thumbMatch) {
                    // 轉換縮圖 URL 為完整 preview.jpg
                    cover = `https://assets-cdn.jable.tv/contents/videos_screenshots/${thumbMatch[1]}/${thumbMatch[2]}/preview.jpg`;
                }
            }
            
            // 策略 3: 尋找任何 assets-cdn 的 jpg 圖片
            if (!cover) {
                cover = text.match(/https?:\/\/assets-cdn\.jable\.tv\/[^\s"'<>]*\.jpg/i)?.[0] || "";
            }
            
            // 策略 4: 尋找 Markdown 圖片語法中的 URL
            if (!cover) {
                const mdImgMatch = text.match(/!\[[^\]]*\]\((https?:\/\/[^)]+\.jpg)\)/i);
                if (mdImgMatch) {
                    cover = mdImgMatch[1];
                }
            }
            
            console.log(`[findMetaFromMarkdown] title:`, title);
            console.log(`[findMetaFromMarkdown] cover:`, cover);
            
            const stream = extractStreamUrl(text);
            
            return { title, cover: cover || "", stream };
        };

        async function testFetch() {
            const url = document.getElementById('testUrl').value.trim();
            const resultDiv = document.getElementById('result');
            const loadingDiv = document.getElementById('loading');
            logArea.textContent = '';
            
            if (!url) {
                resultDiv.innerHTML = '<div class="alert alert-danger">請輸入 URL</div>';
                return;
            }

            loadingDiv.classList.remove('d-none');
            resultDiv.innerHTML = '處理中...';

            try {
                console.log('=== 開始測試 ===');
                console.log('URL:', url);
                
                // 從 URL 提取 slug
                const slugMatch = url.match(/\/videos\/([^\/]+)\/?$/);
                const slug = slugMatch ? slugMatch[1] : null;
                console.log('Slug:', slug);
                
                const html = await fetchFromJina(url);
                
                let meta;
                if (html.includes("Markdown Content:")) {
                    console.log('=== 使用 Markdown 解析 ===');
                    meta = findMetaFromMarkdown(html, 'Unknown');
                    
                    // Markdown 通常沒有正確封面，嘗試從搜索頁獲取
                    if (slug) {
                        console.log('=== 嘗試從搜索頁獲取封面 ===');
                        try {
                            const searchUrl = `https://jable.tv/search/${slug}/`;
                            console.log('Search URL:', searchUrl);
                            const searchHtml = await fetchFromJina(searchUrl);
                            const cover = parseCoverFromSearch(searchHtml, slug, 'jable.tv');
                            console.log('Search page cover:', cover);
                            if (cover) {
                                meta.cover = cover;
                            }
                        } catch (error) {
                            console.log('搜索頁失敗:', error.message);
                        }
                    }
                } else {
                    console.log('=== 使用 HTML 解析 ===');
                    meta = findMetaFromHtml(html, 'Unknown', url);
                }

                console.log('=== 最終結果 ===');
                console.log('Title:', meta.title);
                console.log('Cover:', meta.cover);
                console.log('Stream:', meta.stream);

                resultDiv.innerHTML = `
                    <div class="mb-3">
                        <strong>標題:</strong> ${meta.title}
                    </div>
                    <div class="mb-3">
                        <strong>封面 URL:</strong><br>
                        <code style="word-break: break-all;">${meta.cover || '(未找到)'}</code>
                    </div>
                    ${meta.cover ? `
                        <div class="mb-3">
                            <strong>封面預覽:</strong><br>
                            <img src="${meta.cover}" class="cover-img mt-2" onerror="this.style.border='2px solid red'; this.alt='圖片載入失敗'">
                        </div>
                    ` : ''}
                    <div class="mb-3">
                        <strong>串流 URL:</strong><br>
                        <code style="word-break: break-all;">${meta.stream || '(未找到)'}</code>
                    </div>
                `;
            } catch (error) {
                console.log('=== 錯誤 ===');
                console.log(error.message);
                resultDiv.innerHTML = `<div class="alert alert-danger">錯誤: ${error.message}</div>`;
            } finally {
                loadingDiv.classList.add('d-none');
            }
        }

        const escapeRegExp = (value) => value.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");

        const parseCoverFromSearch = (text, slug, domain) => {
            const safeSlug = escapeRegExp(slug);
            const safeHost = escapeRegExp((domain || "jable.tv").replace(/^www\./, ""));
            const pattern = new RegExp(
                `\\[!\\[[^\\]]*\\]\\((https?://assets-cdn\\.jable\\.tv/contents/videos_screenshots/\\d+/\\d+/320x180/1\\.jpg)\\)[^\\]]*\\]\\(https?://(?:www\\.)?${safeHost}/videos/${safeSlug}/\\)`,
                "i"
            );
            const match = text.match(pattern)?.[1];
            console.log(`[parseCoverFromSearch] Pattern match:`, match);
            
            if (match) {
                const converted = match.replace("/320x180/1.jpg", "/preview.jpg");
                console.log(`[parseCoverFromSearch] Converted:`, converted);
                return converted;
            }
            
            // 備選：尋找任何縮圖並轉換
            const fallbackMatch = text.match(/https?:\/\/assets-cdn\.jable\.tv\/contents\/videos_screenshots\/\d+\/\d+\/320x180\/1\.jpg/i)?.[0];
            if (fallbackMatch) {
                console.log(`[parseCoverFromSearch] Fallback match:`, fallbackMatch);
                return fallbackMatch.replace("/320x180/1.jpg", "/preview.jpg");
            }
            
            return "";
        };
    </script>
</body>
</html>
