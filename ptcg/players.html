<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>玩家排行 - PTCG 情報站</title>
    <link rel="icon" type="image/x-icon" href="../assets/images/favicon.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="css/ptcg.css">
</head>
<body>

    <nav class="ptcg-navbar navbar navbar-expand-lg fixed-top">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center gap-2" href="index.html">
                <span class="ptcg-logo-icon">&#9670;</span>
                <span>PTCG 情報站</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#ptcgNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="ptcgNav">
                <ul class="navbar-nav ms-auto gap-1">
                    <li class="nav-item"><a class="nav-link" href="index.html"><i class="bi bi-house me-1"></i>首頁</a></li>
                    <li class="nav-item"><a class="nav-link" href="tournaments.html"><i class="bi bi-trophy me-1"></i>賽事資訊</a></li>
                    <li class="nav-item"><a class="nav-link active" href="players.html"><i class="bi bi-people me-1"></i>玩家排行</a></li>
                    <li class="nav-item"><a class="nav-link" href="trend.html"><i class="bi bi-graph-up-arrow me-1"></i>積分趨勢</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <section class="page-header">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-lg-8">
                    <nav aria-label="breadcrumb" class="mb-2">
                        <ol class="breadcrumb ptcg-breadcrumb">
                            <li class="breadcrumb-item"><a href="index.html">PTCG 情報站</a></li>
                            <li class="breadcrumb-item active">玩家排行</li>
                        </ol>
                    </nav>
                    <h1 class="page-title"><i class="bi bi-people me-2"></i>台灣玩家積分排行</h1>
                    <p class="page-subtitle">追蹤台灣地區高排名玩家積分動態與賽事出場紀錄</p>
                </div>
                <div class="col-lg-4 text-lg-end mt-3 mt-lg-0">
                    <span class="data-update-badge data-update-badge-players">
                        <i class="bi bi-arrow-clockwise"></i>
                        <span class="data-update-content">
                            <span id="players-update-time">資料更新中...</span>
                            <span class="data-update-detail" id="players-history-update-time">玩家資料更新中...</span>
                            <span class="data-update-detail" id="players-ranking-update-time">排行資料更新中...</span>
                        </span>
                    </span>
                </div>
            </div>
        </div>
    </section>

    <main class="container py-4">

        <!-- Stats Overview -->
        <div class="row g-3 mb-4" id="players-stats-row">
            <div class="col-6 col-md-3">
                <div class="player-stat-card">
                    <div class="player-stat-icon"><i class="bi bi-person-check"></i></div>
                    <div class="player-stat-value" id="pstat-tracked">--</div>
                    <div class="player-stat-label">追蹤玩家數</div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="player-stat-card">
                    <div class="player-stat-icon"><i class="bi bi-star-fill"></i></div>
                    <div class="player-stat-value" id="pstat-top-score">--</div>
                    <div class="player-stat-label">最高積分</div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="player-stat-card">
                    <div class="player-stat-icon"><i class="bi bi-globe-asia-australia"></i></div>
                    <div class="player-stat-value" id="pstat-world-players">--</div>
                    <div class="player-stat-label">世界賽名額</div>
                </div>
            </div>
        </div>

        <!-- Filter Bar -->
        <div class="filter-bar mb-4">
            <div class="row g-2 align-items-center">
                <div class="col-auto">
                    <label class="filter-label">組別</label>
                </div>
                <div class="col-auto">
                    <div class="btn-group filter-group" role="group" aria-label="玩家組別切換">
                        <input type="radio" class="btn-check" name="player-level" id="player-level-master" value="master" data-player-level="master" checked>
                        <label class="btn btn-filter" for="player-level-master">大師組</label>

                        <input type="radio" class="btn-check" name="player-level" id="player-level-senior" value="senior" data-player-level="senior">
                        <label class="btn btn-filter" for="player-level-senior">少年組</label>

                        <input type="radio" class="btn-check" name="player-level" id="player-level-junior" value="junior" data-player-level="junior">
                        <label class="btn btn-filter" for="player-level-junior">孩童組</label>
                    </div>
                </div>
                <div class="col-auto ms-md-auto">
                    <div class="input-group input-group-sm">
                        <span class="input-group-text bg-transparent"><i class="bi bi-search"></i></span>
                        <input type="text" class="form-control" id="player-search" placeholder="搜尋玩家名稱...">
                    </div>
                </div>
                <div class="col-auto">
                    <div class="form-check form-check-inline mb-0">
                        <input class="form-check-input" type="checkbox" id="player-only-detail">
                        <label class="form-check-label small" for="player-only-detail">僅顯示有詳情</label>
                    </div>
                </div>
            </div>
        </div>

        <!-- Players Table -->
        <div class="top-players-table-wrap">
            <table class="ptcg-table" id="players-full-table">
                <thead>
                    <tr>
                        <th width="60">排名</th>
                        <th>玩家名稱</th>
                        <th class="sortable" data-sort="score">
                            積分 <i class="bi bi-arrow-down-up ms-1"></i>
                        </th>
                        <th class="d-none d-lg-table-cell">組別</th>
                        <th class="d-none d-lg-table-cell">地區</th>
                        <th width="80">詳情</th>
                    </tr>
                </thead>
                <tbody id="players-full-body">
                    <tr>
                        <td colspan="6" class="text-center py-5">
                            <div class="ptcg-spinner mx-auto"></div>
                            <p class="mt-3 text-muted mb-0">載入玩家排行資料中...</p>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="d-flex flex-wrap align-items-center justify-content-between gap-2 mt-3">
            <div class="d-flex align-items-center gap-2">
                <label for="players-page-size" class="filter-label mb-0">每頁顯示</label>
                <select id="players-page-size" class="form-select form-select-sm" style="width: auto; min-width: 84px;">
                    <option value="50">50</option>
                    <option value="100">100</option>
                    <option value="200" selected>200</option>
                    <option value="500">500</option>
                </select>
                <span class="text-muted small">筆</span>
            </div>

            <div class="text-muted small" id="players-page-summary">共 0 筆</div>

            <nav aria-label="玩家列表分頁">
                <ul class="pagination pagination-sm ptcg-pagination mb-0" id="players-pagination">
                    <li class="page-item disabled"><button class="page-link" type="button">上一頁</button></li>
                    <li class="page-item disabled"><span class="page-link">1 / 1</span></li>
                    <li class="page-item disabled"><button class="page-link" type="button">下一頁</button></li>
                </ul>
            </nav>
        </div>

    </main>

    <!-- Player Detail Modal -->
    <div class="modal fade" id="playerModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-scrollable">
            <div class="modal-content ptcg-modal">
                <div class="modal-header">
                    <h5 class="modal-title me-auto" id="playerModalTitle">玩家詳情</h5>
                    <span id="playerModalFetchedAt" class="me-3" style="font-size:0.8rem; color: rgba(255,255,255,0.6);"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="playerModalBody">
                    <!-- 動態載入 -->
                </div>
            </div>
        </div>
    </div>

    <footer class="ptcg-footer mt-5">
        <div class="container">
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 py-2">
                <p class="footer-copy mb-0">&copy; 2026 PTCG 情報站 · <a href="../index.html" class="footer-main-link">回 Chuiyi 的生活札記</a></p>
                <p class="footer-disclaimer mb-0">Pokémon &amp; PTCG 相關商標歸任天堂/寶可夢公司所有</p>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/ptcg.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            PTCG.loadPlayersPage();
        });
    </script>
</body>
</html>
