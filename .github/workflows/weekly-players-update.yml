name: Weekly Players Update

on:
  schedule:
    # 每天 UTC 時間 0 點 (台灣時間早上 8 點) 執行一次
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  run-players-update:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Force Scrape All Players
        # 切換到 scraper 目錄執行原本的 scrape_players.js 並帶入全部抓取參數
        run: |
          cd ptcg/scraper
          node scrape_players.js --all --include-404 --delay-ms 600

      - name: Detect changes
        id: detect_changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Detected local changes."
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No local changes to commit."
          fi

      - name: Commit and Push changes
        if: steps.detect_changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: weekly force update all players profile [skip ci]"
          git pull --rebase origin master
          git push
