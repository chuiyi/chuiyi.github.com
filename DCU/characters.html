<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>角色首次登場 | 蝙蝠洞資料庫</title>
    <meta name="description" content="DCU 角色跨足動畫與真人兩種形式的首次登場紀錄，點擊角色卡查看詳細資料">
    <link rel="icon" type="image/x-icon" href="../assets/images/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Bebas+Neue&family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="halftone-bg" aria-hidden="true"></div>

    <header class="dcu-header">
        <div class="dcu-header-inner">
            <a href="index.html" class="dcu-logo">
                <span class="dcu-logo-dc">DC</span><span class="dcu-logo-u">UNIVERSE</span>
            </a>
            <button class="dcu-nav-toggle" aria-label="開啟選單" aria-expanded="false">☰</button>
            <nav class="dcu-nav">
                <a href="index.html">回到 DCU 首頁</a>
                <a href="news.html">新聞</a>
                <a href="elseworlds.html">Elseworlds</a>
            </nav>
        </div>
    </header>

    <section class="dcu-hero">
        <div class="burst burst-1" aria-hidden="true">POW!</div>
        <div class="burst burst-2" aria-hidden="true">BAM!</div>
        <h1 class="dcu-hero-title">
            <span class="line-1">CHARACTERS</span>
            <span class="line-2">FIRST SEEN</span>
        </h1>
        <p class="dcu-hero-sub">DCU 角色常跨足動畫與真人兩種形式，且多由同一位演員身兼配音與真人演出。點擊角色卡查看詳細資料。</p>
    </section>

    <main>
        <section id="characters" class="dcu-section">
            <h2 class="section-title" data-text="CHARACTERS">角色首次登場</h2>
            <p class="section-lead">頭像右下角徽章標示該角色的配音 / 真人演員；點擊卡片可查看詳細資料。</p>

            <div class="char-grid" id="char-grid"></div>
            <p class="tmdb-attribution">動畫角色劇照來源：<a href="https://press.wbd.com/" target="_blank" rel="noopener">Warner Bros. Discovery Pressroom</a> 官方新聞資料庫；演員頭像來源：<a href="https://www.themoviedb.org/" target="_blank" rel="noopener">TMDB</a>。</p>
        </section>
    </main>

    <footer class="dcu-footer">
        <p>&copy; 2026 Chuiyi's DC Comics 資料庫 · <a href="index.html">回到 DCU 首頁</a> · <a href="../index.html">回到主站</a></p>
    </footer>

    <div class="char-modal-overlay" id="char-modal-overlay" hidden>
        <div class="char-modal" role="dialog" aria-modal="true" aria-label="角色詳細資料">
            <button class="char-modal-close" aria-label="關閉">✕</button>
            <div id="char-modal-body"></div>
        </div>
    </div>

    <script src="js/nav.js"></script>
    <script src="js/dcu.js"></script>
    <script>
        DCU.renderCharacters('char-grid', 'characters.json');
    </script>
</body>
</html>
